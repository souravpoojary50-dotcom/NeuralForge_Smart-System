<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - JANSEVA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      text-align: center;
    }

    .container h2 {
      margin-bottom: 10px;
      color: #2a5298;
    }

    .container p.subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      font-size: 14px;
      color: #333;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    .submit-btn {
      width: 100%;
      padding: 10px;
      background: #2a5298;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #1e3c72;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .links a {
      color: #2a5298;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>JANSEVA</h2>
    <p class="subtitle">Enter your registered email address. We'll send you a link to reset your password.</p>
    <form>
      <div class="input-group">
        <label>Registered Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>
      <button type="submit" class="submit-btn"><a href="reset.html">Reset Link</a></button>
    </form>
    <div class="links">
      <p><a href="login.html">&#8592; Back to Login</a></p>
    </div>
  </div>
</body>
</html>
